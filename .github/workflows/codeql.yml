---
name: CodeQL

permissions:
  actions: none
  checks: none
  contents: none
  deployments: none
  issues: none
  packages: none
  pages: none
  pull-requests: none
  repository-projects: none
  security-events: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '36 14 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - go
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Prepare
        run: |
          dir=$(mktemp -d)
          download_url=$(\
            curl -s https://api.github.com/repos/go-swagger/go-swagger/releases/latest | \
            jq -r --arg arch "$(arch)" --arg os "$(uname -o | cut -d'/' -f 2)" '.assets[] | select(.name | test($os+"_"+$arch+"\\.tar\\.gz$")) | .browser_download_url' \
          )
          curl -o "$dir"/swagger.tar.gz -L'#' "$download_url"
          (cd "$dir" && tar xvf swagger.tar.gz swagger)
          sudo install "$dir"/swagger /usr/local/bin
          /usr/local/bin/swagger version
          swagger generate client -f https://developer.shortcut.com/api/rest/v3/shortcut.swagger.json --target pkg/shortcut/gen/
      - name: Setup CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: CodeQL
        uses: github/codeql-action/analyze@v4

